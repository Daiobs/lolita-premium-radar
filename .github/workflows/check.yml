name: Check sources

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 */6 * * *"

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: .data
          key: lolita-radar-state-${{ github.run_id }}
          restore-keys: |
            lolita-radar-state-
      - name: Install
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Audit Feed OS contract
        run: |
          set +e
          python -m lolita_radar.cli audit-feed-os --json > feed-os-audit.json
          audit_exit=$?
          set -e
          python - <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path("feed-os-audit.json").read_text(encoding="utf-8"))
          counts = payload.get("counts", {})
          print(f"Feed OS audit: {payload.get('status')} {counts}")
          for check in payload.get("checks", []):
              print(f"{check.get('status')} | {check.get('name')} | {check.get('detail')}")
          if int(counts.get("fail", 0)) > 0:
              sys.exit(1)
          PY
          echo "audit command exit code: ${audit_exit}"
      - name: Upload Feed OS audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-os-audit
          path: feed-os-audit.json
          if-no-files-found: ignore
      - name: Run checks
        run: python -m lolita_radar.cli check --all
