<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>上新提醒器</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260628-ui2">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-kicker">Local Monitor</div>
          <h1>上新提醒器</h1>
          <p id="configPath">读取配置中</p>
        </div>
        <div class="top-actions">
          <button id="reloadBtn" class="icon-button" title="重新加载配置" aria-label="重新加载配置">↻</button>
          <button id="saveBtn" class="primary-button">保存配置</button>
          <button id="scanBtn" class="scan-button">扫描一次</button>
        </div>
      </header>

      <section id="appOverview" class="command-strip" aria-label="运行概览"></section>

      <main class="workspace">
        <section class="panel target-panel" aria-label="监控目标">
          <div class="panel-head">
            <h2>目标</h2>
            <button id="addTargetBtn" class="icon-button" title="添加目标" aria-label="添加目标">+</button>
          </div>
          <div id="targetList" class="target-list"></div>
        </section>

        <section class="panel editor-panel" aria-label="配置编辑">
          <div class="tabs" role="tablist">
            <button class="tab" data-tab="target" role="tab">目标设置</button>
            <button class="tab" data-tab="global" role="tab">全局设置</button>
            <button class="tab active" data-tab="radar" role="tab">溢价雷达</button>
          </div>

          <form id="targetForm" class="form-grid hidden">
            <label>
              <span>名称</span>
              <input id="targetName" type="text" autocomplete="off">
            </label>
            <label>
              <span>页面 URL</span>
              <input id="targetUrl" type="url" autocomplete="off">
            </label>
            <label class="inline-check">
              <input id="targetEnabled" type="checkbox">
              <span>启用</span>
            </label>
            <label>
              <span>包含关键词</span>
              <textarea id="includeKeywords" rows="5" spellcheck="false"></textarea>
            </label>
            <label>
              <span>排除关键词</span>
              <textarea id="excludeKeywords" rows="5" spellcheck="false"></textarea>
            </label>
            <div class="two-cols">
              <label>
                <span>最低价</span>
                <input id="priceMin" type="number" min="0" step="0.01">
              </label>
              <label>
                <span>最高价</span>
                <input id="priceMax" type="number" min="0" step="0.01">
              </label>
            </div>
            <button id="deleteTargetBtn" type="button" class="danger-button">删除目标</button>
          </form>

          <form id="globalForm" class="form-grid hidden">
            <div class="two-cols">
              <label>
                <span>扫描间隔秒数</span>
                <input id="pollInterval" type="number" min="30" step="1">
              </label>
              <label>
                <span>抓取方式</span>
                <select id="fetcherType">
                  <option value="http">HTTP</option>
                  <option value="playwright">Playwright</option>
                  <option value="file">本地文件</option>
                </select>
              </label>
            </div>
            <label class="inline-check">
              <input id="notifyOnFirstScan" type="checkbox">
              <span>首次扫描也提醒</span>
            </label>
            <label>
              <span>User-Agent</span>
              <input id="userAgent" type="text" autocomplete="off">
            </label>
            <div class="two-cols">
              <label>
                <span>超时秒数</span>
                <input id="timeoutSeconds" type="number" min="1" step="1">
              </label>
              <label>
                <span>Playwright 等待秒数</span>
                <input id="waitSeconds" type="number" min="0" step="1">
              </label>
            </div>
            <label>
              <span>浏览器资料目录</span>
              <input id="userDataDir" type="text" autocomplete="off">
            </label>
            <label class="inline-check">
              <input id="webhookEnabled" type="checkbox">
              <span>启用 Webhook</span>
            </label>
            <label>
              <span>Webhook URL</span>
              <input id="webhookUrl" type="url" autocomplete="off">
            </label>
          </form>

          <section id="radarView" class="radar-view">
            <div class="radar-head">
              <div>
                <h2>溢价雷达工作台</h2>
                <p id="radarDbPath">读取中</p>
              </div>
              <button id="refreshRadarBtn" type="button" class="icon-button" title="刷新雷达" aria-label="刷新雷达">↻</button>
            </div>
            <div id="radarOverview" class="radar-overview"></div>
            <div class="radar-tools">
              <form id="radarItemForm" class="radar-form">
                <h3>款式</h3>
                <input id="radarEditingItemId" type="hidden">
                <label>
                  <span>编辑已有款式</span>
                  <select id="radarEditItemId"></select>
                </label>
                <div class="item-edit-actions">
                  <button id="loadRadarItemBtn" type="button" class="scan-button">载入</button>
                  <button id="newRadarItemBtn" type="button" class="scan-button">新建</button>
                  <button id="deleteRadarItemBtn" type="button" class="danger-button">删除款式</button>
                </div>
                <div class="two-cols">
                  <label>
                    <span>品牌</span>
                    <input id="radarBrandName" type="text" autocomplete="off">
                  </label>
                  <label>
                    <span>系列</span>
                    <input id="radarSeriesName" type="text" autocomplete="off">
                  </label>
                </div>
                <div class="two-cols">
                  <label>
                    <span>款式名</span>
                    <input id="radarItemName" type="text" autocomplete="off">
                  </label>
                  <label>
                    <span>品类</span>
                    <input id="radarCategory" type="text" autocomplete="off" placeholder="JSK / OP / skirt">
                  </label>
                </div>
                <div class="two-cols">
                  <label>
                    <span>色名</span>
                    <input id="radarColorway" type="text" autocomplete="off">
                  </label>
                  <label>
                    <span>原价 JPY</span>
                    <input id="radarOriginalPriceJpy" type="number" min="0" step="1">
                  </label>
                </div>
                <div class="two-cols">
                  <label>
                    <span>汇率</span>
                    <input id="radarJpyToCny" type="number" min="0" step="0.0001" value="0.05">
                  </label>
                  <label>
                    <span>发售信号</span>
                    <input id="radarReleaseSignalScore" type="number" min="0" max="100" step="1" value="50">
                  </label>
                </div>
                <label>
                  <span>发售日期</span>
                  <input id="radarReleaseDate" type="date">
                </label>
                <div class="two-cols">
                  <label>
                    <span>日本运费 CNY</span>
                    <input id="radarJapanShipping" type="number" min="0" step="0.01">
                  </label>
                  <label>
                    <span>国际运费 CNY</span>
                    <input id="radarInternationalShipping" type="number" min="0" step="0.01">
                  </label>
                </div>
                <div class="two-cols">
                  <label>
                    <span>代购费 CNY</span>
                    <input id="radarProxyFee" type="number" min="0" step="0.01">
                  </label>
                  <label>
                    <span>税费缓冲 CNY</span>
                    <input id="radarTaxBuffer" type="number" min="0" step="0.01">
                  </label>
                </div>
                <label>
                  <span>来源 URL</span>
                  <input id="radarItemSourceUrl" type="url" autocomplete="off">
                </label>
                <button id="addRadarItemBtn" type="submit" class="primary-button">添加款式</button>
              </form>

              <form id="radarSampleForm" class="radar-form">
                <h3>价格样本</h3>
                <input id="radarEditingSampleId" type="hidden">
                <div class="item-edit-actions">
                  <button id="newRadarSampleBtn" type="button" class="scan-button">新建样本</button>
                </div>
                <label>
                  <span>关联款式</span>
                  <select id="radarSampleItemId"></select>
                </label>
                <div class="two-cols">
                  <label>
                    <span>来源</span>
                    <select id="radarSampleSourceType">
                      <option value="xianyu">闲鱼</option>
                      <option value="taobao">淘宝</option>
                      <option value="mercari">Mercari</option>
                      <option value="wunderwelt">Wunderwelt</option>
                      <option value="closet_child">Closet Child</option>
                      <option value="rakuma">Rakuma</option>
                      <option value="yahoo_auction">Yahoo Auction</option>
                    </select>
                  </label>
                  <label>
                    <span>状态</span>
                    <select id="radarListingStatus">
                      <option value="listed">在售</option>
                      <option value="sold">已售</option>
                      <option value="unknown">未知</option>
                    </select>
                  </label>
                </div>
                <div class="two-cols">
                  <label>
                    <span>挂价 CNY</span>
                    <input id="radarListedPriceCny" type="number" min="0" step="0.01">
                  </label>
                  <label>
                    <span>成交价 CNY</span>
                    <input id="radarSoldPriceCny" type="number" min="0" step="0.01">
                  </label>
                </div>
                <div class="two-cols">
                  <label>
                    <span>成色</span>
                    <input id="radarCondition" type="text" autocomplete="off">
                  </label>
                  <label>
                    <span>可信度</span>
                    <input id="radarConfidence" type="number" min="0" max="1" step="0.05" value="0.7">
                  </label>
                </div>
                <label>
                  <span>标题</span>
                  <input id="radarSampleTitle" type="text" autocomplete="off">
                </label>
                <label>
                  <span>样本 URL</span>
                  <input id="radarSampleSourceUrl" type="url" autocomplete="off">
                </label>
                <button id="addRadarSampleBtn" type="submit" class="primary-button">添加样本</button>
              </form>
            </div>

            <div class="radar-action-grid">
              <form id="radarImportForm" class="radar-import">
                <label>
                  <span>CSV 路径</span>
                  <input id="radarImportPath" type="text" autocomplete="off" placeholder="examples/radar-samples.csv">
                </label>
                <button id="importRadarBtn" type="submit" class="scan-button">导入 CSV</button>
              </form>
              <form id="radarWatchForm" class="radar-watch">
                <label>
                  <span>监控款式</span>
                  <select id="radarWatchItemId"></select>
                </label>
                <label>
                  <span>淘宝/店铺 URL</span>
                  <input id="radarWatchUrl" type="url" autocomplete="off">
                </label>
                <label>
                  <span>最高价</span>
                  <input id="radarWatchPriceMax" type="number" min="0" step="0.01">
                </label>
                <button id="createWatchTargetBtn" type="submit" class="scan-button">生成监控</button>
              </form>
              <form id="radarReviewForm" class="radar-review">
                <label>
                  <span>复盘款式</span>
                  <select id="radarReviewItemId"></select>
                </label>
                <label>
                  <span>状态</span>
                  <select id="radarReviewStatus">
                    <option value="pending">待观察</option>
                    <option value="hit">命中</option>
                    <option value="miss">未命中</option>
                  </select>
                </label>
                <label>
                  <span>观察价 CNY</span>
                  <input id="radarObservedPriceCny" type="number" min="0" step="0.01">
                </label>
                <label>
                  <span>窗口天数</span>
                  <input id="radarReviewWindowDays" type="number" min="0" step="1" placeholder="30 / 60 / 90">
                </label>
                <label>
                  <span>备注</span>
                  <input id="radarReviewNotes" type="text" autocomplete="off">
                </label>
                <button id="saveRadarReviewBtn" type="submit" class="scan-button">保存复盘</button>
              </form>
            </div>

            <div class="radar-collector-grid">
              <form id="radarCollectForm" class="radar-collect">
                <div class="radar-collect-grid">
                  <label>
                    <span>采集款式</span>
                    <select id="radarCollectItemId"></select>
                  </label>
                  <label>
                    <span>来源</span>
                    <select id="radarCollectSourceType">
                      <option value="xianyu">闲鱼</option>
                      <option value="taobao">淘宝</option>
                      <option value="mercari">Mercari</option>
                      <option value="wunderwelt">Wunderwelt</option>
                      <option value="closet_child">Closet Child</option>
                      <option value="proxy">代购</option>
                    </select>
                  </label>
                  <label>
                    <span>默认状态</span>
                    <select id="radarCollectStatus">
                      <option value="listed">在售</option>
                      <option value="sold">已售</option>
                      <option value="unknown">未知</option>
                    </select>
                  </label>
                  <label>
                    <span>可信度</span>
                    <input id="radarCollectConfidence" type="number" min="0" max="1" step="0.05" value="0.65">
                  </label>
                </div>
                <label>
                  <span>粘贴商品行</span>
                  <textarea id="radarCollectText" rows="6" spellcheck="false" placeholder="例：AP Sample Print JSK Pink ￥2800 https://..."></textarea>
                </label>
                <button id="collectRadarBtn" type="submit" class="primary-button">解析并保存</button>
              </form>
              <form id="radarReleaseCollectForm" class="radar-release-collect">
                <div class="release-collect-grid">
                  <label>
                    <span>品牌</span>
                    <input id="radarReleaseCollectBrand" type="text" autocomplete="off">
                  </label>
                  <label>
                    <span>默认系列</span>
                    <input id="radarReleaseCollectSeries" type="text" autocomplete="off">
                  </label>
                  <label>
                    <span>默认品类</span>
                    <input id="radarReleaseCollectCategory" type="text" autocomplete="off" placeholder="JSK / OP">
                  </label>
                  <label>
                    <span>发售日期</span>
                    <input id="radarReleaseCollectDate" type="date">
                  </label>
                  <label>
                    <span>汇率</span>
                    <input id="radarReleaseCollectJpyToCny" type="number" min="0" step="0.0001" value="0.05">
                  </label>
                  <label>
                    <span>发售信号</span>
                    <input id="radarReleaseCollectSignal" type="number" min="0" max="100" step="1" value="70">
                  </label>
                </div>
                <label>
                  <span>来源 URL</span>
                  <input id="radarReleaseCollectUrl" type="url" autocomplete="off">
                </label>
                <label>
                  <span>粘贴发售行</span>
                  <textarea id="radarReleaseCollectText" rows="6" spellcheck="false" placeholder="例：2026年7月15日 Sample Print JSK Pink ¥32,780 https://..."></textarea>
                </label>
                <button id="collectReleaseBtn" type="submit" class="primary-button">解析发售</button>
              </form>
            </div>

            <div class="radar-board">
              <section class="aggregate-panel">
                <div class="aggregate-head">
                  <h2>品牌/系列关注榜</h2>
                  <span id="aggregateCount">0 组</span>
                </div>
                <div id="aggregateList" class="aggregate-list"></div>
              </section>
              <section class="release-panel">
                <div class="release-head">
                  <h2>发售关注</h2>
                  <span id="releaseWatchCount">0 个</span>
                </div>
                <div id="releaseWatchList" class="release-list"></div>
              </section>
              <section class="collection-panel">
                <div class="collection-head">
                  <h2>采集队列</h2>
                  <span id="collectionTaskCount">0 项</span>
                </div>
                <div id="collectionTaskList" class="collection-list"></div>
              </section>
              <section class="watch-panel">
                <div class="watch-head">
                  <h2>监控建议</h2>
                  <span id="watchRecommendationCount">0 项</span>
                </div>
                <div id="watchRecommendationList" class="watch-list"></div>
              </section>
            </div>
            <section class="review-panel">
              <div class="review-head">
                <h2>复盘台账</h2>
                <span id="reviewCount">0 条</span>
              </div>
              <div id="reviewStats" class="review-stats"></div>
              <div id="reviewList" class="review-list"></div>
            </section>
            <div id="radarList" class="radar-list"></div>
            <div class="sample-ledger">
              <div class="sample-ledger-head">
                <h2>样本台账</h2>
                <span id="sampleLedgerCount">0 条</span>
              </div>
              <div id="sampleLedgerList" class="sample-ledger-list"></div>
            </div>
          </section>
        </section>

        <section class="panel results-panel" aria-label="扫描结果">
          <div class="panel-head">
            <h2>扫描结果</h2>
            <span id="scanStatus" class="status-text">待扫描</span>
          </div>
          <div id="summaryGrid" class="summary-grid"></div>
          <div id="resultList" class="result-list"></div>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/assets/app.js?v=20260628-ui2"></script>
  </body>
</html>
